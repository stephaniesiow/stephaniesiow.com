<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream:  #F5F2ED;
    --ink:    #1A1814;
    --ink-lt: #4a4540;
    --ink-mu: #7a7268;
    --gold:   #C9A96E;
    --div:    rgba(26,24,20,0.15);
  }

  html, body { height: 100%; background: var(--cream); -webkit-font-smoothing: antialiased; }

  /* Grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 100; opacity: .035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 99;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(20,16,10,.07) 100%);
  }

  /* Top gold rule */
  .top-rule {
    position: fixed; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    animation: fadeIn 1.2s ease 1.2s forwards;
  }

  /* Corner marks */
  .corner {
    position: fixed; width: 18px; height: 18px;
    opacity: 0;
    animation: fadeIn 1.2s ease 1.4s forwards;
  }
  .corner.tl { top:24px; left:28px;  border-top:1px solid var(--ink-mu); border-left:1px solid var(--ink-mu);  }
  .corner.tr { top:24px; right:28px; border-top:1px solid var(--ink-mu); border-right:1px solid var(--ink-mu); }
  .corner.bl { bottom:24px; left:28px;  border-bottom:1px solid var(--ink-mu); border-left:1px solid var(--ink-mu);  }
  .corner.br { bottom:24px; right:28px; border-bottom:1px solid var(--ink-mu); border-right:1px solid var(--ink-mu); }

  /* Layout */
  main {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: clamp(2rem,6vw,4rem) clamp(1.5rem,5vw,3rem);
    position: relative; z-index: 1;
  }

  /* Name */
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2.8rem,9vw,7.2rem);
    font-weight: 700;
    line-height: .95; letter-spacing: -.01em;
    text-align: center; color: var(--ink);
    opacity: 0; transform: translateY(16px);
    animation: riseIn 1.1s ease .3s forwards;
  }

  /* Gold rule */
  .gold-rule {
    width: 48px; height: 1px;
    background: var(--gold);
    margin: 2.6rem auto 0;
    opacity: 0;
    animation: fadeIn 1.1s ease .6s forwards;
  }

  /* Nav */
  nav {
    margin-top: 2.4rem;
    opacity: 0; transform: translateY(10px);
    animation: riseIn 1.1s ease .8s forwards;
  }
  nav ul {
    list-style: none;
    display: flex; flex-direction: column;
    align-items: center; gap: 1.1rem;
  }

  .divider { display: none; }

  nav a {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.05rem,2.4vw,1.45rem);
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: #3d3d3d;
    text-decoration: none;
    position: relative; padding-bottom: 2px;
    transition: color .35s ease;
  }
  nav a::after {
    content: '';
    position: absolute; bottom: 0; left: 0;
    width: 0; height: 2px;
    background: var(--gold);
    transition: width .4s cubic-bezier(.25,.46,.45,.94);
  }
  nav a:hover { color: var(--gold); }
  nav a:hover::after { width: 100%; }

  /* Footer */
  footer {
    position: fixed; bottom: 28px; left: 0; right: 0;
    display: flex; justify-content: center;
    z-index: 1;
    opacity: 0;
    animation: fadeIn 1.4s ease 1.2s forwards;
  }
  .footer-inner {
    display: flex; align-items: center; gap: .8rem;
  }
  .footer-inner span {
    font-family: 'Cormorant Garamond', serif;
    font-size: .65rem; font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase; color: var(--ink-mu);
  }
  .footer-divider {
    font-weight: 700;
    font-size: .75rem;
    color: var(--gold);
    line-height: 1;
  }
  footer a {
    font-family: 'Cormorant Garamond', serif;
    font-size: .65rem; font-weight: 600;
    letter-spacing: .22em;
    text-transform: uppercase; color: var(--ink-mu);
    text-decoration: none;
    position: relative; padding-bottom: 1px;
    transition: color .3s ease;
  }
  footer a::after {
    content: '';
    position: absolute; bottom: 0; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width .35s cubic-bezier(.25,.46,.45,.94);
  }
  footer a:hover { color: var(--ink); }
  footer a:hover::after { width: 100%; }

  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @media (max-width: 540px) {
    .corner { display: none; }
  }
</style>

<div class="corner tl" aria-hidden="true"></div>
<div class="corner tr" aria-hidden="true"></div>
<div class="corner bl" aria-hidden="true"></div>
<div class="corner br" aria-hidden="true"></div>

<main>

    </ul>
  </nav>
</main>

<footer>
  <div class="footer-inner">
    <span>All rights reserved</span>
  </div>
</footer>
